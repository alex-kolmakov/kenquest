services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
      - "3000:3000"  # FalkorDB browser UI
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      target: backend
    volumes:
      - kenquest_data:/app/data
      - frontend_dist:/app/frontend_dist  # populated at build time
    environment:
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-2.0-flash}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_PATH=/app/data/kenquest.duckdb
      - CHROMA_PATH=/app/data/chroma
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
    depends_on:
      falkordb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kenquest_data:
  falkordb_data:
  frontend_dist:
