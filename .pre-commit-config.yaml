repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly type check
        language: system
        entry: uv run pyrefly check
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        language: system
        entry: uv run pytest tests/ -v --tb=short
        types: [python]
        pass_filenames: false

      - id: tsc
        name: tsc type check
        language: system
        entry: bash -c "cd frontend && npx tsc -b --noEmit"
        files: ^frontend/
        pass_filenames: false
